dataset:
  type: wordnet_graphs
  params:
    n_graphs: 1000
    n_samples: 100
    k: 15
  validation:
    use_train: True
model_config:
  model: EncodeProcessDecode
  cfg:
    processor_cfg:
      model: GNNBaseline
      cfg:
        layer_type: GCNLayer
        hidden_dim: 600
        num_layers: 5
        tau: 0.35
        sigma: 0.35
        negative_dual: False
    in_node_dim: 300
    in_edge_dim: 300
    embedding_dim: 300
    mlp_hidden_dim: 600
    lam: 0.10
    residual_stream: False
    recurrent_steps: 1
    encoder_decoder_act: SiLU
device: cuda:7
epochs: 500
loss_function: energy_pdg
lr: 0.0001
batch_size: 64
identity_initialization: False

